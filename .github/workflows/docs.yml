# Build Sphinx and deploy to GitHub Pages.
#
# Triggers:
#   * push to main           — deploy
#   * pull_request to main   — build only (no deploy), so PR authors get
#                              a CI signal that docs still build clean
#   * manual workflow_dispatch
#
# Pages is configured via repo settings: Source = "GitHub Actions" (set
# automatically by `gh api ... --method PUT /repos/<o>/<r>/pages`).

name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# One concurrent deploy at a time; in-flight runs cancelled when a newer
# commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build HTML (strict)
        run: |
          sphinx-build -M html docs/source docs/build -W --keep-going
          # GitHub Pages otherwise tries to run Jekyll on the output and
          # strips underscored directories (e.g. `_static/`). Empty file
          # disables the Jekyll path entirely.
          touch docs/build/html/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    # PR builds verify the build works but don't deploy.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
